events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    server {

        listen 80;
        server_name localhost;

        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location / {
            root html;
            index index.html;
        }


        location /api/auth/health {
            proxy_pass http://auth-service:3000/api/health;
        }

        location /api/soft/health {
            proxy_pass http://software-service:3000/api/health;
        }

        location = /image {
            proxy_pass http://pictrs:8080/image;
        }

        location /image/ {
            proxy_pass http://pictrs:8080/image/;
        }

        location /api/auth/authenticate {
            error_log /var/log/nginx/error.log debug;
            internal;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;

            proxy_pass http://auth-service:3000/api/auth/validate;
        }

        location /api/auth/login {
            proxy_pass http://auth-service:3000/api/auth/login;
        }

        location /api/auth/register {
            proxy_pass http://auth-service:3000/api/auth/register;
        }

        location /api/auth/logout {
            proxy_pass http://auth-service:3000/api/auth/logout;
        }

        location /api/internal/users/sync {
            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/users/[^/]+/profile$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/users/[^/]+/(followers|following)$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/users/[^/]+$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/posts/[^/]+/comments$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        location ~ ^/api/posts/[^/]+$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/posts/[\d]+/likes$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        location /api/posts {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        location /api/me {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        location /api/subscribe {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/comments/[^/]+/replies$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location ~ ^/api/comments/[^/]+$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location /api/comments {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        ##
        location /api/likes {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }

        location ~ ^/api/feed$ {
            auth_request /api/auth/authenticate;
            auth_request_set $user_uuid $upstream_http_x_user_uuid;
            proxy_set_header X-User-UUID $user_uuid;

            proxy_pass http://software-service:3000$request_uri;
        }
    }
}